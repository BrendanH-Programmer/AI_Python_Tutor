<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Python Tutor</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">
    <h1>AI Python Tutor</h1>

    <textarea id="codeInput" placeholder="Paste your Python code here..."></textarea>

    <button onclick="sendCode()">Analyse Code</button>
    <button onclick="nextHint()">Next Hint</button>
    
    <div class="output">
        <h3>Response</h3>
        <pre id="responseBox"></pre>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
